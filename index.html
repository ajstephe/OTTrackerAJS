<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Overtime Tracker by AJS</title>
    
    <!-- CSS & Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <!-- React 18 & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body class="bg-slate-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 1. ICON COMPONENT ---
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const icons = {
                home: <g><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></g>,
                plus: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></g>,
                calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></g>,
                graph: <g><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></g>,
                settings: <g><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></g>,
                check: <polyline points="20 6 9 17 4 12"/>,
                clock: <g><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>,
                arrowLeft: <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>,
                edit: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></g>,
                trash: <g><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></g>,
                pound: <g><path d="M18 7c0-5.333-8-5.333-8 0"/><path d="M10 7v14"/><path d="M6 21h12"/><path d="M6 13h10"/></g>,
                chevronRight: <polyline points="9 18 15 12 9 6"/>,
                userPlus: <g><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></g>,
                download: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></g>,
                upload: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></g>,
                shieldCheck: <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></g>,
                trending: <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- 2. CONFIG & PAY DATA ---
        const FY_START = '2026-02-09', FY_END = '2027-02-07';
        const PAY_PERIODS = [
            { month: 'April 2026', short: 'Apr', start: '2026-02-09', end: '2026-03-08' },
            { month: 'May 2026', short: 'May', start: '2026-03-09', end: '2026-04-12' },
            { month: 'June 2026', short: 'Jun', start: '2026-04-13', end: '2026-05-10' },
            { month: 'July 2026', short: 'Jul', start: '2026-05-11', end: '2026-06-07' },
            { month: 'August 2026', short: 'Aug', start: '2026-06-08', end: '2026-07-12' },
            { month: 'September 2026', short: 'Sep', start: '2026-07-13', end: '2026-08-09' },
            { month: 'October 2026', short: 'Oct', start: '2026-08-10', end: '2026-09-06' },
            { month: 'November 2026', short: 'Nov', start: '2026-09-07', end: '2026-10-11' },
            { month: 'December 2026', short: 'Dec', start: '2026-10-12', end: '2026-11-08' },
            { month: 'January 2027', short: 'Jan', start: '2026-11-09', end: '2026-12-06' },
            { month: 'February 2027', short: 'Feb', start: '2026-12-07', end: '2027-01-10' },
            { month: 'March 2027', short: 'Mar', start: '2027-01-11', end: '2027-02-07' }
        ];

        const PAY_RATES = {
            'Constable (Joined Pre 2013)': {
                'PC - Year 4': { r133: 25.688, r150: 28.906, r200: 38.541 },
                'PC - Year 5': { r133: 26.470, r150: 29.787, r200: 39.715 },
                'PC - Year 6': { r133: 28.677, r150: 32.270, r200: 43.027 },
                'PC - Year 7+': { r133: 30.910, r150: 34.782, r200: 46.376 }
            },
            'Constable (Joined Post 2013)': {
                'PC - Year 3': { r133: 20.781, r150: 23.385, r200: 31.180 },
                'PC - Year 4': { r133: 21.591, r150: 24.296, r200: 32.394 },
                'PC - Year 5': { r133: 23.210, r150: 26.117, r200: 34.823 },
                'PC - Year 6': { r133: 26.470, r150: 29.787, r200: 39.715 },
                'PC - Year 7+': { r133: 30.910, r150: 34.782, r200: 46.376 }
            },
            'Sergeant': {
                'Sgt - Point 1': { r133: 32.946, r150: 37.073, r200: 49.431 },
                'Sgt - Point 2': { r133: 33.619, r150: 37.830, r200: 50.440 },
                'Sgt - Point 3+': { r133: 34.570, r150: 38.901, r200: 51.868 }
            }
        };

        const PA_RATES = { 'None': 0, 'PA1': 40, 'PA2': 90, 'PA3': 125 };

        // --- 3. MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [expandedMonth, setExpandedMonth] = useState(null);
            const [editingEntry, setEditingEntry] = useState(null);
            const [showSaveSuccess, setShowSaveSuccess] = useState(false);
            const mainRef = useRef(null);
            const fileInputRef = useRef(null);

            const [entries, setEntries] = useState(() => {
                const saved = localStorage.getItem('ajs_ot_entries_v4');
                return saved ? JSON.parse(saved) : [];
            });

            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('ajs_ot_settings_v4');
                return saved ? JSON.parse(saved) : { rank: '', service: '', rates: { r133: 0, r150: 0, r200: 0 }, taxRate: 40 };
            });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0], reason: '', hours133: '', hours150: '', hours200: '', paRate: 'None', comments: ''
            });

            useEffect(() => {
                localStorage.setItem('ajs_ot_entries_v4', JSON.stringify(entries));
                localStorage.setItem('ajs_ot_settings_v4', JSON.stringify(settings));
            }, [entries, settings]);

            const fyEntries = useMemo(() => entries.filter(e => e.date >= FY_START && e.date <= FY_END), [entries]);

            const totals = useMemo(() => {
                let gOT = 0, gPA = 0, tHrs = 0;
                const rates = settings.rates || { r133: 0, r150: 0, r200: 0 };
                fyEntries.forEach(e => {
                    const h = { r133: parseFloat(e.hours133)||0, r150: parseFloat(e.hours150)||0, r200: parseFloat(e.hours200)||0 };
                    tHrs += (h.r133 + h.r150 + h.r200);
                    gOT += (h.r133 * rates.r133) + (h.r150 * rates.r150) + (h.r200 * rates.r200);
                    gPA += PA_RATES[e.paRate] || 0;
                });
                const totalGross = gOT + gPA, totalNet = totalGross * (1 - (settings.taxRate / 100));
                const todayStr = new Date().toISOString().split('T')[0];
                const currentIndex = PAY_PERIODS.findIndex(p => todayStr >= p.start && todayStr <= p.end);
                const getPeriodStats = (idx) => {
                    if (idx < 0 || idx >= PAY_PERIODS.length) return null;
                    const p = PAY_PERIODS[idx];
                    const pE = fyEntries.filter(e => e.date >= p.start && e.date <= p.end);
                    let g = 0; pE.forEach(e => {
                        const h = { r133: parseFloat(e.hours133)||0, r150: parseFloat(e.hours150)||0, r200: parseFloat(e.hours200)||0 };
                        g += (h.r133 * rates.r133) + (h.r150 * rates.r150) + (h.r200 * rates.r200) + (PA_RATES[e.paRate] || 0);
                    });
                    return { month: p.month, gross: g, net: g * (1 - settings.taxRate / 100) };
                };
                return { grossOT: gOT, grossPA: gPA, totalGross, totalNet, totalHrs: tHrs, prev: getPeriodStats(currentIndex-1), curr: getPeriodStats(currentIndex), next: getPeriodStats(currentIndex+1) };
            }, [fyEntries, settings]);

            const handleSave = () => {
                if (!formData.date) return;
                if (editingEntry) {
                    setEntries(prev => prev.map(e => e.id === editingEntry.id ? { ...formData, id: e.id } : e));
                    setEditingEntry(null);
                    setActiveTab('months');
                } else {
                    setEntries(prev => [...prev, { ...formData, id: Date.now().toString() }]);
                    setShowSaveSuccess(true);
                    setTimeout(() => setShowSaveSuccess(false), 3000);
                    mainRef.current?.scrollTo({ top: 0, behavior: 'smooth' });
                }
                setFormData({ date: new Date().toISOString().split('T')[0], reason: '', hours133: '', hours150: '', hours200: '', paRate: 'None', comments: '' });
            };

            const handleExport = () => {
                const data = { entries, settings, exportDate: new Date().toISOString(), app: "Overtime Tracker by AJS" };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `AJS_OT_Backup_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
            };

            const handleImport = (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (imported.entries) setEntries(imported.entries);
                        if (imported.settings) setSettings(imported.settings);
                        setActiveTab('dashboard');
                    } catch (err) { console.error("Restore failed", err); }
                };
                reader.readAsText(file);
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto relative bg-slate-50 border-x border-gray-100 shadow-2xl overflow-hidden">
                    <header className="bg-white p-5 border-b flex items-center justify-center shrink-0 z-10 shadow-sm">
                        <h1 className="text-lg font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-950 to-blue-600 flex items-center gap-2 tracking-tight">
                            <Icon name="pound" className="text-blue-700" /> Overtime Tracker by AJS
                        </h1>
                    </header>

                    <main ref={mainRef} className="flex-1 overflow-y-auto no-scrollbar scroll-smooth">
                        {activeTab === 'dashboard' && (
                            <div className="p-4 space-y-6 pb-24 fade-in">
                                {!settings.rank && <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 flex items-start gap-4 animate-pulse"><Icon name="userPlus" className="w-6 h-6 text-amber-600 shrink-0" /><div><h3 className="font-bold text-amber-900 text-sm">Setup Required</h3><p className="text-amber-800 text-xs mt-1">Setup your rank and pay point in Settings.</p><button onClick={() => setActiveTab('settings')} className="mt-2 text-xs font-bold text-amber-900 bg-amber-200 px-3 py-1.5 rounded-lg">Go to Settings</button></div></div>}
                                <div className="bg-blue-950 rounded-3xl p-7 text-white shadow-xl relative overflow-hidden">
                                    <div className="absolute -right-4 -top-4 bg-white/5 w-24 h-24 rounded-full blur-2xl"></div>
                                    <p className="text-blue-300 text-[10px] font-black uppercase tracking-widest mb-1 leading-none">Gross Total 26/27</p>
                                    <h2 className="text-5xl font-black mb-6 tracking-tight">£{totals.totalGross.toFixed(2)}</h2>
                                    <div className="grid grid-cols-2 gap-4 border-t border-white/10 pt-5">
                                        <div><p className="text-blue-400 text-[10px] uppercase font-bold tracking-wider">Est. Net</p><p className="text-2xl font-bold text-emerald-400">£{totals.totalNet.toFixed(2)}</p></div>
                                        <div><p className="text-blue-400 text-[10px] uppercase font-bold tracking-wider">Hours</p><p className="text-2xl font-bold flex items-center gap-2"><Icon name="clock" className="w-5 h-5 opacity-50" /> {totals.totalHrs.toFixed(1)}</p></div>
                                    </div>
                                </div>
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                                    <h3 className="font-black text-gray-800 mb-4 flex items-center gap-2 text-xs uppercase tracking-widest leading-none"><Icon name="trending" className="w-4 h-4 text-blue-600" /> Current Rates</h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center py-2 border-b border-gray-50 text-sm"><span className="text-gray-400 font-bold uppercase text-[10px]">Rank</span><span className="font-black text-gray-800 truncate pl-4">{settings.service || 'Not Selected'}</span></div>
                                        <div className="grid grid-cols-3 gap-3 pt-1">
                                            {['1.33x', '1.5x', '2.0x'].map((label, i) => (
                                                <div key={label} className="bg-slate-50 p-2 rounded-xl text-center">
                                                    <p className="text-[9px] font-black text-gray-400 uppercase mb-1">{label}</p>
                                                    <p className="text-xs font-black text-blue-900">£{(settings.rates?.[['r133', 'r150', 'r200'][i]] || 0).toFixed(2)}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <h3 className="font-black text-gray-800 text-xs uppercase px-1 tracking-widest leading-none">Pay Month Summary</h3>
                                    {[totals.prev, totals.curr, totals.next].map((item, i) => item && (
                                        <div key={i} className={`rounded-2xl p-5 border flex justify-between items-center transition-all ${i === 1 ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-white border-gray-100'}`}>
                                            <div><p className={`text-[9px] font-black uppercase mb-1 ${i === 1 ? 'text-blue-600' : 'text-gray-400'}`}>{['Previous', 'Current', 'Next'][i]}</p><h4 className="font-bold text-gray-800 text-lg leading-none">{item.month}</h4></div>
                                            <div className="text-right"><p className="text-sm font-black text-blue-900 mb-1 leading-none">£{item.gross.toFixed(2)} G</p><p className="text-sm font-black text-emerald-600 leading-none">£{item.net.toFixed(2)} N</p></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'add' && (
                            <div className="p-4 pb-24 fade-in">
                                <h2 className="text-2xl font-black text-gray-800 mb-8 px-1 tracking-tight">{editingEntry ? 'Edit Record' : 'Log New Shift'}</h2>
                                {showSaveSuccess && <div className="mb-6 bg-emerald-50 text-emerald-800 p-5 rounded-2xl flex items-center gap-4 border border-emerald-100 animate-in fade-in"><Icon name="check" className="text-emerald-500 w-6 h-6" /><p className="font-black text-sm">Log Saved Successfully</p></div>}
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Date</label><input type="date" className="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} /></div>
                                        <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Duty</label><input type="text" placeholder="MPL701" className="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" value={formData.reason} onChange={e => setFormData({...formData, reason: e.target.value})} /></div>
                                    </div>
                                    <div className="bg-blue-50/50 p-6 rounded-3xl border border-blue-100 space-y-4">
                                        <p className="text-[11px] font-black text-blue-900 uppercase tracking-widest text-center leading-none">Overtime Hours</p>
                                        <div className="grid grid-cols-3 gap-4">
                                            {['hours133', 'hours150', 'hours200'].map((h, i) => (
                                                <div key={h} className="text-center"><label className="block text-[10px] font-black text-blue-600 mb-2 leading-none">{[1.33, '1.5', 2.0][i]}x</label><input type="number" step="0.25" placeholder="0" className="w-full border-none rounded-2xl p-3 text-center text-sm font-black shadow-inner focus:ring-2 focus:ring-blue-500 outline-none" value={formData[h]} onChange={e => setFormData({...formData, [h]: e.target.value})} /></div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-amber-50/50 p-6 rounded-3xl border border-amber-100 space-y-4">
                                        <p className="text-[11px] font-black text-amber-900 uppercase tracking-widest text-center leading-none">PA Allowance</p>
                                        <div className="flex gap-2">
                                            {['None', 'PA1', 'PA2', 'PA3'].map(pa => (
                                                <button key={pa} onClick={() => setFormData({...formData, paRate: pa})} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${formData.paRate === pa ? 'bg-amber-500 text-white shadow-lg' : 'bg-white text-amber-900/50 hover:bg-amber-100'}`}>{pa}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div><label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1 leading-none">Notes</label><textarea rows="3" placeholder="Incident #, MPL code, etc..." className="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-inner resize-none" value={formData.comments} onChange={e => setFormData({...formData, comments: e.target.value})} /></div>
                                    <button onClick={handleSave} className="w-full bg-blue-600 text-white font-black p-5 rounded-2xl shadow-xl active:scale-95 transition-all flex justify-center items-center gap-3"><Icon name="save" className="w-6 h-6" /> {editingEntry ? 'Update Record' : 'Save Record'}</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'months' && (
                            <div className="p-4 space-y-4 pb-24 fade-in">
                                <h2 className="text-2xl font-black text-gray-800 px-1 tracking-tight">Detailed Records</h2>
                                {PAY_PERIODS.map(p => {
                                    const pE = fyEntries.filter(e => e.date >= p.start && e.date <= p.end);
                                    let gOT = 0, gPA = 0, hTot = 0, pa1=0, pa2=0, pa3=0;
                                    pE.forEach(e => {
                                        const hr = { r133: parseFloat(e.hours133)||0, r150: parseFloat(e.hours150)||0, r200: parseFloat(e.hours200)||0 };
                                        gOT += (hr.r133 * settings.rates.r133) + (hr.r150 * settings.rates.r150) + (hr.r200 * settings.rates.r200);
                                        gPA += PA_RATES[e.paRate];
                                        hTot += (hr.r133 + hr.r150 + hr.r200);
                                        if (e.paRate === 'PA1') pa1++; else if (e.paRate === 'PA2') pa2++; else if (e.paRate === 'PA3') pa3++;
                                    });
                                    const tax = settings.taxRate/100, totG = gOT + gPA, totN = totG * (1 - tax);
                                    const isExp = expandedMonth === p.month;
                                    return (
                                        <div key={p.month} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                            <button onClick={() => setExpandedMonth(isExp ? null : p.month)} className="w-full text-left p-5 hover:bg-slate-50 transition-colors">
                                                <div className="flex justify-between items-start mb-4"><div><h3 className="font-bold text-gray-800 text-xl tracking-tight leading-none">{p.month}</h3><p className="text-[10px] text-blue-600 font-black uppercase tracking-widest mt-2 leading-none">{new Date(p.start).toLocaleDateString('en-GB', {day:'numeric', month:'short'})} - {new Date(p.end).toLocaleDateString('en-GB', {day:'numeric', month:'short'})}</p></div><div className="bg-blue-100 px-3 py-1.5 rounded-xl text-blue-700 font-black text-xs">{hTot.toFixed(1)} hrs</div></div>
                                                <div className="grid grid-cols-2 gap-4 border-t border-slate-50 pt-4 mt-2"><div><p className="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1 leading-none">Gross</p><p className="font-black text-blue-950 text-xl leading-none">£{totG.toFixed(2)}</p></div><div className="text-right"><p className="text-[9px] font-black text-emerald-600 uppercase tracking-widest mb-1 leading-none">Net</p><p className="font-black text-emerald-600 text-xl leading-none">£{totN.toFixed(2)}</p></div></div>
                                            </button>
                                            {isExp && (
                                                <div className="bg-slate-50/50 p-4 space-y-3 border-t border-gray-100">
                                                    {pE.length === 0 ? <p className="text-center text-xs py-8 text-gray-400 font-bold uppercase tracking-widest leading-none">No records yet.</p> : 
                                                        [...pE].sort((a,b) => new Date(a.date) - new Date(b.date)).map(e => {
                                                            const eOT = (parseFloat(e.hours133)||0)*settings.rates.r133 + (parseFloat(e.hours150)||0)*settings.rates.r150 + (parseFloat(e.hours200)||0)*settings.rates.r200;
                                                            const ePA = PA_RATES[e.paRate] || 0;
                                                            return (
                                                                <div key={e.id} className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm space-y-3">
                                                                    <div className="flex justify-between items-start"><div><p className="text-sm font-black text-gray-900 leading-none">{new Date(e.date).toLocaleDateString('en-GB')}</p><p className="text-xs text-blue-600 font-bold mt-1.5 leading-none uppercase">{e.reason || 'Shift'}</p></div><div className="flex gap-1.5"><button onClick={() => { setFormData(e); setEditingEntry(e); setActiveTab('add'); }} className="p-2 text-gray-400 hover:text-blue-600 bg-slate-50 rounded-lg"><Icon name="edit" className="w-4 h-4" /></button><button onClick={() => setEntries(entries.filter(x=>x.id!==e.id))} className="p-2 text-gray-400 hover:text-red-600 bg-slate-50 rounded-lg"><Icon name="trash" className="w-4 h-4" /></button></div></div>
                                                                    <div className="grid grid-cols-2 gap-2 text-[10px] font-bold">
                                                                        <div className="bg-slate-50 p-1.5 rounded flex justify-between"><span>OT:</span> <span className="text-blue-900 font-black">£{eOT.toFixed(2)}</span></div>
                                                                        <div className="bg-amber-50 p-1.5 rounded flex justify-between"><span>PA:</span> <span className="text-amber-800 font-black">£{ePA.toFixed(2)}</span></div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })
                                                    }
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'graph' && (
                            <div className="p-4 pb-24 fade-in">
                                <h2 className="text-2xl font-black text-gray-800 mb-2 px-1 tracking-tight">Earnings Trends</h2>
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-8 px-1 leading-none">Gross vs Net (Combined Monthly)</p>
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                                    {(() => {
                                        const data = PAY_PERIODS.map(p => {
                                            const pE = fyEntries.filter(e => e.date >= p.start && e.date <= p.end);
                                            let g = 0; pE.forEach(e => {
                                                const rates = settings.rates || { r133: 0, r150: 0, r200: 0 };
                                                g += (parseFloat(e.hours133)||0)*rates.r133 + (parseFloat(e.hours150)||0)*rates.r150 + (parseFloat(e.hours200)||0)*rates.r200 + (PA_RATES[e.paRate] || 0);
                                            });
                                            return { short: p.short, g, n: g * (1 - settings.taxRate/100) };
                                        });
                                        const max = Math.max(...data.map(d => d.g), 200);
                                        return (
                                            <>
                                                <div className="flex h-64 border-b border-slate-100 pb-2 relative items-end">
                                                    <div className="flex flex-col justify-between items-end pr-4 text-[9px] font-black text-slate-300 w-12 shrink-0 h-full absolute -left-12"><span>£{Math.round(max)}</span><span>£{Math.round(max/2)}</span><span>£0</span></div>
                                                    <div className="flex-1 flex items-end justify-between gap-1 h-full pt-4 px-1">
                                                        {data.map((d, i) => (
                                                            <div key={i} className="flex-1 flex flex-col items-center group relative h-full">
                                                                <div className="w-full flex items-end justify-center gap-[1px] h-full"><div className="w-[45%] bg-blue-600 rounded-t-sm shadow-sm transition-all duration-700" style={{ height: `${(d.g/max)*100}%` }}></div><div className="w-[45%] bg-emerald-500 rounded-t-sm shadow-sm transition-all duration-700" style={{ height: `${(d.n/max)*100}%` }}></div></div>
                                                                <div className="absolute -top-12 bg-slate-900 text-white text-[9px] p-2 rounded-xl hidden group-hover:block z-20 whitespace-nowrap shadow-xl font-bold">£{d.g.toFixed(0)} G / £{d.n.toFixed(0)} N</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="flex mt-3 text-[8px] font-black text-slate-400 uppercase tracking-tighter ml-12">{data.map((d,i) => <div key={i} className="flex-1 text-center truncate">{d.short}</div>)}</div>
                                            </>
                                        );
                                    })()}
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="p-4 pb-24 space-y-6 fade-in">
                                <h2 className="text-xl font-black text-gray-800 px-1 tracking-tight">Settings</h2>
                                <div className="bg-white rounded-3xl p-7 shadow-sm border border-gray-100 space-y-8">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1 leading-none">Rank & Era</label>
                                            <select className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all mb-4" value={settings.rank} onChange={e => {
                                                const r = e.target.value; if (!r) return setSettings({...settings, rank: '', service: ''});
                                                const s = Object.keys(PAY_RATES[r])[0];
                                                setSettings({...settings, rank: r, service: s, rates: PAY_RATES[r][s]});
                                            }}><option value="">Select Rank...</option>{Object.keys(PAY_RATES).map(k => <option key={k} value={k}>{k}</option>)}</select>
                                            {settings.rank && (
                                                <>
                                                    <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1 leading-none animate-in fade-in">Pay Point</label>
                                                    <select className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all animate-in fade-in" value={settings.service} onChange={e => setSettings({...settings, service: e.target.value, rates: PAY_RATES[settings.rank][e.target.value]})}>{Object.keys(PAY_RATES[settings.rank]).map(p => <option key={p} value={p}>{p}</option>)}</select>
                                                </>
                                            )}
                                        </div>
                                        {settings.rank && settings.service && (
                                            <div className="bg-slate-50 rounded-2xl p-4 border border-slate-100 animate-in zoom-in-95 duration-200">
                                                <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-3 text-center leading-none">Hourly Rate</p>
                                                <div className="grid grid-cols-3 gap-3">
                                                    {['1.33x', '1.5x', '2.0x'].map((label, i) => (
                                                        <div key={label} className="text-center"><p className="text-[9px] font-black text-gray-400 uppercase mb-1 tracking-tighter leading-none">{label}</p><p className="text-sm font-black text-gray-800 leading-none">£{(settings.rates?.[['r133', 'r150', 'r200'][i]] || 0).toFixed(2)}</p></div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="border-t border-slate-50 pt-8 text-center">
                                        <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 leading-none">Tax Calculation (%)</label>
                                        <div className="flex gap-2 p-1.5 bg-slate-50 rounded-2xl border border-slate-100">
                                            {[20, 40, 45].map(rate => (<button key={rate} onClick={()=>setSettings({...settings, taxRate: rate})} className={`flex-1 py-4 rounded-xl text-sm font-black transition-all ${settings.taxRate===rate ? 'bg-blue-600 text-white shadow-lg scale-105' : 'text-slate-400 hover:bg-slate-200'}`}>{rate}%</button>))}
                                        </div>
                                    </div>
                                </div>
                                
                                {/* DATA MANAGEMENT CARD - MOVED BELOW TAX BAND */}
                                <div className="bg-blue-900 rounded-3xl p-6 text-white shadow-xl space-y-4">
                                    <div className="flex items-center gap-5"><div className="p-4 bg-white/10 rounded-2xl shadow-inner"><Icon name="shieldCheck" className="w-8 h-8 text-blue-100" /></div><div><h3 className="font-bold text-lg leading-none mb-1 tracking-tight uppercase">Data Management</h3><p className="text-blue-200 text-xs">Records are stored locally.</p></div></div>
                                    <div className="bg-blue-950/50 rounded-2xl p-4 space-y-3">
                                        <p className="text-[11px] text-blue-100/70 leading-relaxed italic">Create a backup or restore from a backup if you ever need to clear your web browser.</p>
                                        <div className="flex gap-2">
                                            <button onClick={handleExport} className="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-[10px] font-black flex justify-center items-center gap-2 active:scale-95 transition-all"><Icon name="download" className="w-3 h-3" /> Backup</button>
                                            <button onClick={() => fileInputRef.current.click()} className="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl text-[10px] font-black flex justify-center items-center gap-2 active:scale-95 transition-all"><Icon name="upload" className="w-3 h-3" /> Restore</button>
                                            <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleImport} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="bg-white/80 backdrop-blur-md border-t border-gray-100 absolute bottom-0 w-full px-4 h-20 pb-safe shrink-0 z-20 flex justify-between items-center shadow-[0_-10px_30px_-10px_rgba(0,0,0,0.05)]">
                        {[
                            { id: 'dashboard', icon: 'home', label: 'Overview' },
                            { id: 'add', icon: 'plus', label: 'Log OT' },
                            { id: 'months', icon: 'calendar', label: 'History' },
                            { id: 'graph', icon: 'graph', label: 'Trends' },
                            { id: 'settings', icon: 'settings', label: 'Settings' }
                        ].map((tab) => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1.5 transition-all px-2 ${activeTab === tab.id ? 'text-blue-600 scale-110' : 'text-slate-300'}`}>
                                <Icon name={tab.icon} className={`w-6 h-6 ${activeTab === tab.id ? 'stroke-[2.5px]' : 'stroke-2'}`} />
                                <span className="text-[9px] font-black uppercase tracking-tighter">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
